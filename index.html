<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>3Rsystem Cloud · Gestão Compartilhada</title>
    <!-- Favicon moderno -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%232e7d32'/%3E%3Cpath d='M30 35 L50 20 L70 35 L70 65 L50 80 L30 65 Z' fill='white' opacity='0.9'/%3E%3Ctext x='50' y='72' font-size='42' text-anchor='middle' fill='%232e7d32' font-weight='bold' font-family='Arial'%3E3R%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        /* ===== ESTILOS GLOBAIS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        :root {
            --bg-body: #f2f5f7;
            --bg-app: #ffffff;
            --bg-header: #fafdfb;
            --border-color: #e9edf2;
            --text-primary: #1e3a2f;
            --text-secondary: #2a4236;
            --text-muted: #5e7a6b;
            --accent: #2e7d32;
            --accent-hover: #1b5e2a;
            --sidebar-bg: #ffffff;
            --sidebar-border: #e0e8ed;
            --menu-hover: #eaf4ef;
            --menu-active: #e0f0e6;
            --card-bg: #ffffff;
            --card-border: #e3e9ef;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            --input-border: #cad5d0;
            --table-header-border: #cbdcd2;
            --table-row-border: #e2ebe5;
        }

        body.dark-theme {
            --bg-body: #121212;
            --bg-app: #1e1e1e;
            --bg-header: #2a2a2a;
            --border-color: #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --accent: #4caf7a;
            --accent-hover: #66bb8a;
            --sidebar-bg: #1e1e1e;
            --sidebar-border: #333333;
            --menu-hover: #2c2c2c;
            --menu-active: #2d7242;
            --card-bg: #2d2d2d;
            --card-border: #444444;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            --input-border: #555555;
            --table-header-border: #444444;
            --table-row-border: #444444;
        }

        body {
            background: var(--bg-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            transition: background-color 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            background: var(--bg-app);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .app-header {
            padding: 14px 24px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 1.2rem;
        }
        .app-header i {
            color: var(--accent);
            font-size: 1.6rem;
        }
        .app-header .sistema-nome {
            font-weight: 600;
        }
        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .layout {
            display: flex;
            flex: 1;
            min-height: 0;
            background: var(--bg-body);
        }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            transition: width 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar.collapsed {
            width: 80px;
        }
        .sidebar-header {
            padding: 24px 16px 16px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--sidebar-border);
        }
        .sidebar-header h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .toggle-btn {
            background: transparent;
            border: none;
            font-size: 1.3rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
        }
        .toggle-btn:hover {
            background: var(--menu-hover);
        }
        .menu {
            flex: 1;
            padding: 24px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            border-left: 3px solid transparent;
        }
        .menu-item i {
            font-size: 1.3rem;
            min-width: 24px;
            color: var(--accent);
        }
        .menu-item:hover {
            background: var(--menu-hover);
            border-left-color: var(--accent);
        }
        .menu-item.active {
            background: var(--menu-active);
            border-left-color: var(--accent-hover);
            color: var(--accent-hover);
        }
        .sidebar.collapsed .menu-item span {
            display: none;
        }
        .sidebar.collapsed .sidebar-header h3 {
            display: none;
        }

        /* Área do usuário no menu lateral */
        .sidebar-user {
            padding: 16px 16px 8px 16px;
            border-top: 1px solid var(--sidebar-border);
            border-bottom: 1px solid var(--sidebar-border);
            margin-bottom: 8px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .user-info i {
            font-size: 1.2rem;
            color: var(--accent);
        }
        .user-info span {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .logout-sidebar-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            width: 100%;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .logout-sidebar-btn:hover {
            color: var(--accent);
        }
        .sidebar.collapsed .user-info span,
        .sidebar.collapsed .logout-sidebar-btn span {
            display: none;
        }
        .sidebar.collapsed .logout-sidebar-btn {
            justify-content: center;
        }
        .sidebar.collapsed .user-info {
            justify-content: center;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--sidebar-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-footer-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-footer-btn:hover {
            background: var(--menu-hover);
        }
        .sidebar.collapsed .theme-footer-btn span {
            display: none;
        }

        .content {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            background: var(--bg-body);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 28px;
            margin-bottom: 28px;
            box-shadow: 0 6px 14px rgba(0, 30, 10, 0.05);
        }

        h2, h3, h4 {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 20px;
        }
        h3 i {
            color: var(--accent);
            margin-right: 8px;
        }

        input, select, textarea, button {
            border: 1px solid var(--input-border);
            padding: 10px 16px;
            font-size: 0.9rem;
            background: var(--card-bg);
            color: var(--text-primary);
            outline: none;
        }
        textarea {
            resize: vertical;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }
        .btn {
            background: var(--card-bg);
            border: 1px solid var(--input-border);
            font-weight: 500;
            cursor: pointer;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent-hover);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        .btn-danger {
            background: #d32f2f;
            border-color: #b71c1c;
            color: white;
        }
        .btn-danger:hover {
            background: #b71c1c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 14px 8px;
            color: var(--text-primary);
            font-weight: 600;
            border-bottom: 2px solid var(--table-header-border);
        }
        td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--table-row-border);
            color: var(--text-secondary);
            vertical-align: middle;
        }
        .product-photo {
            width: 40px;
            height: 40px;
            object-fit: cover;
            background: #f0f0f0;
            cursor: pointer;
        }
        .photos-stack {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .photos-stack img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        /* Carrinho */
        .cart-main-block {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 24px;
            margin-bottom: 28px;
        }
        .cart-search-area {
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .cart-search-field {
            flex: 2;
            min-width: 200px;
        }
        .cart-search-field label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .cart-cliente-select {
            flex: 1;
            min-width: 180px;
        }
        .cart-items-container {
            margin: 20px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .cart-items-table {
            max-height: 280px;
            overflow-y: auto;
            width: 100%;
        }
        .cart-items-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .cart-items-table th,
        .cart-items-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid var(--table-row-border);
        }
        .cart-items-table th {
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 2;
        }
        .cart-total {
            text-align: right;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--accent);
            margin: 20px 0 16px;
            padding-top: 16px;
            border-top: 2px solid var(--border-color);
        }
        .cart-observacao {
            margin: 20px 0;
        }
        .cart-pagamento-area {
            margin: 24px 0 16px;
        }
        .metodos-pagamento {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .detalhe-pagamento-area {
            background: var(--bg-body);
            padding: 16px;
            margin: 16px 0;
        }
        .cart-finalizar {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 16px;
        }
        .remove-item {
            background: transparent;
            border: none;
            color: #d32f2f;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .push-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            color: #1e3a2f;
            padding: 14px 28px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-left: 4px solid var(--accent);
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.2s ease;
            pointer-events: none;
        }
        body.dark-theme .push-notification {
            background: rgba(30,30,30,0.92);
            color: #e0e0e0;
        }
        .push-notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,20,0,0.4);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }
        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 32px;
            width: 520px;
            max-width: 90%;
            box-shadow: 0 30px 50px rgba(0,40,0,0.2);
        }

        .photo-upload-group {
            margin: 12px 0;
            padding: 8px;
            border: 1px solid var(--input-border);
        }
        .photo-preview-small {
            width: 64px;
            height: 64px;
            object-fit: cover;
            background: var(--menu-hover);
        }

        @media (max-width: 680px) {
            body { padding: 0; }
            .app-container { border: none; }
            .layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); }
            .sidebar.collapsed { width: 100%; }
            .content { padding: 20px; }
        }

        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            gap: 20px;
            backdrop-filter: blur(4px);
        }
        .lightbox img {
            max-width: 80vw;
            max-height: 80vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .filtros-relatorio {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            margin-bottom: 24px;
            background: var(--card-bg);
            padding: 20px;
            border: 1px solid var(--card-border);
        }
        .grupo-filtro {
            flex: 1;
            min-width: 150px;
        }
        .grupo-filtro label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .acoes-relatorio {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .resumo-vendedor {
            margin-top: 28px;
            background: var(--bg-body);
            padding: 16px;
            border-left: 4px solid var(--accent);
        }
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        .config-card {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            padding: 20px;
            transition: all 0.2s;
        }
        .config-card h4 {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .config-card h4 i {
            color: var(--accent);
            font-size: 1.2rem;
        }
        .config-actions {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        /* Estilo tela login - quadrada */
        .login-card {
            background: var(--card-bg);
            border-radius: 0;
            padding: 40px 32px;
            width: 420px;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
        }
        .login-card i {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
        }
        .login-card input,
        .login-card button {
            border-radius: 0;
            margin-bottom: 20px;
            width: 100%;
        }
        .login-card input {
            background: var(--bg-body);
            padding: 14px 20px;
        }
        .login-card button {
            padding: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="app-header">
        <i class="fas fa-store"></i>
        <span class="sistema-nome" id="sistemaNomeHeader">3Rsystem Cloud</span>
        <div class="header-actions">
            <span id="relogio" style="font-size: 0.85rem;">--:--:--</span>
            <a href="https://consultadanfe.com/" target="_blank" style="text-decoration: none; display: flex; align-items: center; gap: 6px;"><i class="fas fa-file-invoice"></i> NF</a>
        </div>
    </div>
    <div class="layout" id="layout"></div>
</div>

<!-- Modais -->
<div id="adminModal" class="modal-overlay" style="display: none;"><div class="modal-card"><h4>Autorização de administrador</h4><input type="password" id="adminPassInput" placeholder="senha master" style="width: 100%; margin-bottom: 20px;"><div style="display: flex; gap: 12px; justify-content: flex-end;"><button class="btn" id="cancelAdminBtn">Cancelar</button><button class="btn btn-primary" id="confirmAdminBtn">Confirmar</button></div></div></div>
<div id="productModal" class="modal-overlay" style="display: none;"><div class="modal-card" style="width: 560px;"><h4 id="productModalTitle"><i class="fas fa-camera"></i> Produto (até 2 fotos)</h4><input type="text" id="prodNome" placeholder="Nome do produto" style="width:100%; margin-bottom:12px;"><input type="number" id="prodPreco" placeholder="Preço R$" step="0.01" style="width:100%; margin-bottom:12px;"><input type="number" id="prodQtd" placeholder="Quantidade inicial" style="width:100%; margin-bottom:12px;"><input type="text" id="prodUnidade" placeholder="Unidade (un, kg, l)" style="width:100%; margin-bottom:12px;"><input type="number" id="prodMinima" placeholder="Estoque mínimo" style="width:100%; margin-bottom:12px;"><input type="text" id="prodCodigo" placeholder="Código (opcional)" style="width:100%; margin-bottom:12px;"><input type="text" id="prodCategoria" placeholder="Categoria" style="width:100%; margin-bottom:12px;"><div><label>📸 Fotos (máx 2)</label></div><div class="photo-upload-group" id="photoGroup1"><div style="display: flex; gap: 12px; align-items: center;"><img id="prodPhoto1Preview" class="photo-preview-small" src=""><button type="button" class="photo-upload-btn" data-photo-idx="0"><i class="fas fa-image"></i> Foto 1</button><button type="button" class="clear-photo-btn" data-idx="0"><i class="fas fa-trash-alt"></i></button></div></div><div class="photo-upload-group" id="photoGroup2"><div style="display: flex; gap: 12px; align-items: center;"><img id="prodPhoto2Preview" class="photo-preview-small" src=""><button type="button" class="photo-upload-btn" data-photo-idx="1"><i class="fas fa-image"></i> Foto 2</button><button type="button" class="clear-photo-btn" data-idx="1"><i class="fas fa-trash-alt"></i></button></div></div><input type="file" id="productPhotoFileTemp" accept="image/*" style="display: none;"><div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;"><button class="btn" id="cancelProductBtn">Cancelar</button><button class="btn btn-primary" id="saveProductBtn">Salvar</button></div></div></div>
<div id="clienteModal" class="modal-overlay" style="display: none;"><div class="modal-card"><h4 id="clienteModalTitle"><i class="fas fa-user-plus"></i> Cliente</h4><input type="text" id="clienteNome" placeholder="Nome *" style="width:100%; margin-bottom:12px;"><input type="text" id="clienteTelefone" placeholder="Telefone" style="width:100%; margin-bottom:12px;"><input type="text" id="clienteDocumento" placeholder="CPF/CNPJ" style="width:100%; margin-bottom:12px;"><textarea id="clienteEndereco" rows="2" placeholder="Endereço completo" style="width:100%; margin-bottom:12px;"></textarea><textarea id="clienteObservacao" rows="2" placeholder="Observação" style="width:100%; margin-bottom:12px;"></textarea><div style="display: flex; gap: 12px; justify-content: flex-end;"><button class="btn" id="cancelClienteBtn">Cancelar</button><button class="btn btn-primary" id="saveClienteBtn">Salvar</button></div></div></div>
<div id="usuarioModal" class="modal-overlay" style="display: none;"><div class="modal-card"><h4><i class="fas fa-users-cog"></i> Usuário</h4><input type="text" id="usuarioNome" placeholder="Nome completo *" style="width:100%; margin-bottom:12px;"><input type="text" id="usuarioLogin" placeholder="Usuário (login) *" style="width:100%; margin-bottom:12px;"><input type="password" id="usuarioSenha" placeholder="Senha *" style="width:100%; margin-bottom:12px;"><select id="usuarioRole" style="width:100%; margin-bottom:20px;"><option value="seller">Vendedor</option><option value="admin">Administrador</option></select><div style="display: flex; gap: 12px; justify-content: flex-end;"><button class="btn" id="cancelUsuarioBtn">Cancelar</button><button class="btn btn-primary" id="saveUsuarioBtn">Salvar</button></div></div></div>
<div id="comprovanteModal" class="modal-overlay" style="display: none;"><div class="modal-card" style="max-width: 500px; text-align: center;"><div id="comprovanteContent"></div><div style="margin-top: 16px;"><button class="btn" id="fecharComprovanteBtn">Fechar</button><a id="downloadComprovanteLink" class="btn btn-primary" download="comprovante" style="display: inline-flex; text-decoration: none;">Baixar arquivo</a></div></div></div>
<div class="push-notification" id="pushNotification"></div>

<script>
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {

    async function attachVendasEvents() {
        document.getElementById('addProdutoBtn')?.addEventListener('click', async () => {
            const nomeBusca = document.getElementById('buscaProduto').value.trim();
            const qtd = parseInt(document.getElementById('qtdProduto').value) || 1;
            if (!nomeBusca) { showPush('Digite o nome do produto', true); return; }
            if (qtd <= 0) { showPush('Quantidade inválida', true); return; }
            const produtosSnap = await db.collection('produtos').where('nome', '==', nomeBusca).where('ativo', '==', true).get();
            if (produtosSnap.empty) { showPush('Produto não encontrado', true); return; }
            const produtoDoc = produtosSnap.docs[0];
            const produto = { id: produtoDoc.id, ...produtoDoc.data() };
            if ((produto.qtdAtual || 0) < qtd) { showPush(`Estoque insuficiente. Disponível: ${produto.qtdAtual}`, true); return; }
            const indexExistente = carrinho.findIndex(item => item.id === produto.id);
            if (indexExistente >= 0) { carrinho[indexExistente].qtd += qtd; } 
            else { carrinho.push({ id: produto.id, nome: produto.nome, preco: produto.preco, qtd: qtd, unidade: produto.unidade }); }
            showPush(`${produto.nome} adicionado ao carrinho`);
            await renderVendasEAtualizar();
        });

        // Remover item com senha admin
        const removeBtns = document.querySelectorAll('.remove-item');
        removeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                solicitarSenhaAdmin((autorizado) => {
                    if(autorizado) {
                        const idx = parseInt(btn.dataset.index);
                        if (!isNaN(idx) && carrinho[idx]) {
                            carrinho.splice(idx, 1);
                            showPush('Item removido');
                            renderVendasEAtualizar();
                        }
                    } else {
                        showPush('Remoção cancelada', true);
                    }
                });
            });
        });

        document.getElementById('selectCliente')?.addEventListener('change', async (e) => {
            const clienteId = e.target.value;
            if (clienteId) {
                const docSnap = await db.collection('clientes').doc(clienteId).get();
                if (docSnap.exists) clienteSelecionado = { id: docSnap.id, ...docSnap.data() };
                else clienteSelecionado = null;
            } else { clienteSelecionado = null; }
        });

        const metodoBtns = document.querySelectorAll('.metodo-pagamento');
        metodoBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const metodo = btn.dataset.metodo;
                metodoPagamentoSelecionado = metodo;
                const detalheDiv = document.getElementById('detalhePagamento');
                const pixArea = document.getElementById('pixComprovanteArea');
                if (metodo === 'dinheiro') {
                    detalheDiv.innerHTML = `<strong>Pagamento: Dinheiro</strong><br><label>Valor recebido (R$):</label><input type="number" id="valorRecebido" step="0.01" placeholder="Digite o valor recebido"><span id="trocoDisplay"></span>`;
                    const valorInput = document.getElementById('valorRecebido');
                    if(valorInput) valorInput.addEventListener('input', () => {
                        const total = carrinho.reduce((s,i)=> s + (i.preco*i.qtd),0) - (carrinho.desconto||0);
                        const recebido = parseFloat(valorInput.value) || 0;
                        const troco = recebido - total;
                        document.getElementById('trocoDisplay').innerHTML = troco >=0 ? ` Troco: R$ ${troco.toFixed(2)}` : ` Faltam R$ ${Math.abs(troco).toFixed(2)}`;
                        dinheiroValorRecebido = recebido;
                    });
                    pixArea.style.display = 'none';
                } else if (metodo === 'credito') {
                    detalheDiv.innerHTML = `<strong>Pagamento: Crédito</strong><br><label>Número de parcelas:</label><select id="parcelasCredito">${Array.from({length:24},(_,i)=>`<option value="${i+1}">${i+1}x</option>`).join('')}</select><br><label>Número do comprovante:</label><input type="text" id="comprovanteCredito" placeholder="Digite o número do comprovante">`;
                    document.getElementById('parcelasCredito')?.addEventListener('change', (e) => creditoParcelas = parseInt(e.target.value));
                    document.getElementById('comprovanteCredito')?.addEventListener('input', (e) => creditoComprovante = e.target.value);
                    pixArea.style.display = 'none';
                } else if (metodo === 'pix') {
                    detalheDiv.innerHTML = `<strong>Pagamento: PIX</strong>`;
                    pixArea.style.display = 'block';
                } else {
                    detalheDiv.innerHTML = `<strong>Pagamento: ${metodo.toUpperCase()}</strong>`;
                    pixArea.style.display = 'none';
                }
            });
        });

        document.getElementById('pixComprovanteFile')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentPixFileName = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => { currentPixFileBase64 = ev.target.result; document.getElementById('pixFileName').innerText = file.name; };
            reader.readAsDataURL(file);
        });

        document.getElementById('aplicarDescontoBtn')?.addEventListener('click', () => {
            if (currentUser.role !== 'admin') { showPush('Apenas administradores podem aplicar desconto', true); return; }
            const totalAtual = carrinho.reduce((s, i) => s + (i.preco * i.qtd), 0);
            const desconto = parseFloat(prompt(`Valor do desconto (R$). Total atual: R$ ${totalAtual.toFixed(2)}`));
            if (isNaN(desconto) || desconto <= 0 || desconto >= totalAtual) { showPush('Desconto inválido', true); return; }
            carrinho.desconto = desconto;
            showPush(`Desconto de R$ ${desconto.toFixed(2)} aplicado`);
            renderVendasEAtualizar();
        });

        document.getElementById('cancelarVendaBtn')?.addEventListener('click', () => {
            if(carrinho.length === 0) { showPush('Carrinho já está vazio'); return; }
            solicitarSenhaAdmin((autorizado) => {
                if(autorizado) {
                    carrinho = [];
                    clienteSelecionado = null;
                    metodoPagamentoSelecionado = null;
                    currentPixFileBase64 = null;
                    currentPixFileName = '';
                    creditoParcelas = 1;
                    creditoComprovante = '';
                    dinheiroValorRecebido = 0;
                    delete carrinho.desconto;
                    showPush('Venda cancelada');
                    renderVendasEAtualizar();
                } else { showPush('Cancelamento não autorizado', true); }
            });
        });

        document.getElementById('finalizarVendaBtn')?.addEventListener('click', async () => {
            if (carrinho.length === 0) { showPush('Carrinho vazio', true); return; }
            if (!metodoPagamentoSelecionado) { showPush('Selecione um método de pagamento', true); return; }
            if (metodoPagamentoSelecionado === 'pix' && !currentPixFileBase64) { showPush('Para PIX é obrigatório anexar o comprovante', true); return; }

            const totalBruto = carrinho.reduce((s, i) => s + (i.preco * i.qtd), 0);
            const desconto = carrinho.desconto || 0;
            let totalFinal = totalBruto - desconto;
            let troco = null, valorRecebido = null;
            if(metodoPagamentoSelecionado === 'dinheiro') {
                valorRecebido = dinheiroValorRecebido;
                if(valorRecebido < totalFinal) { showPush(`Valor recebido insuficiente. Faltam R$ ${(totalFinal - valorRecebido).toFixed(2)}`, true); return; }
                troco = valorRecebido - totalFinal;
            }
            const clienteNome = clienteSelecionado ? clienteSelecionado.nome : (document.getElementById('selectCliente').value === '' ? 'Cliente avulso' : 'Cliente avulso');
            const observacao = document.getElementById('observacaoVenda').value;
            const configSis = await carregarConfigSistema();

            const vendaObj = {
                id: Date.now().toString(),
                data: new Date().toLocaleString('pt-BR'),
                dataISO: new Date().toISOString(),
                cliente: clienteNome,
                clienteId: clienteSelecionado?.id || null,
                vendedorId: currentUser.id,
                vendedorNome: currentUser.nome,
                itens: carrinho.map(i => ({ id: i.id, nome: i.nome, preco: i.preco, qtd: i.qtd, unidade: i.unidade })),
                total: totalFinal,
                desconto: desconto,
                pagamento: metodoPagamentoSelecionado,
                observacao: observacao,
                estabelecimento: configSis.nomeEstabelecimento,
                comprovanteBase64: metodoPagamentoSelecionado === 'pix' ? currentPixFileBase64 : null,
                comprovanteNome: metodoPagamentoSelecionado === 'pix' ? currentPixFileName : null,
                troco: troco,
                valorRecebido: valorRecebido,
                parcelas: metodoPagamentoSelecionado === 'credito' ? creditoParcelas : null,
                numeroComprovante: metodoPagamentoSelecionado === 'credito' ? creditoComprovante : null
            };

            try {

        document.getElementById('saveClienteBtn')?.addEventListener('click', async () => { const nome = document.getElementById('clienteNome').value.trim(); if(!nome) { showPush('Nome obrigatório', true); return; } const telefone = document.getElementById('clienteTelefone').value; const documento = document.getElementById('clienteDocumento').value; const endereco = document.getElementById('clienteEndereco').value; const observacao = document.getElementById('clienteObservacao').value; const clienteData = { nome, telefone, documento, endereco, observacao }; try { if(editingClienteId) { await db.collection('clientes').doc(editingClienteId).update(clienteData); await addLog('Cliente editado', `${nome}`); showPush('Cliente atualizado'); } else { const newId = Date.now().toString(); await db.collection('clientes').doc(newId).set({ ...clienteData, id: newId }); await addLog('Cliente criado', `${nome}`); showPush('Cliente cadastrado'); } document.getElementById('clienteModal').style.display = 'none'; renderApp(); } catch(e) { showPush("Erro ao salvar cliente: " + e.message, true); } });
        document.getElementById('cancelClienteBtn')?.addEventListener('click', () => document.getElementById('clienteModal').style.display = 'none');
        document.getElementById('saveUsuarioBtn')?.addEventListener('click', async () => { const nome = document.getElementById('usuarioNome').value.trim(); const login = document.getElementById('usuarioLogin').value.trim(); const senha = document.getElementById('usuarioSenha').value; const role = document.getElementById('usuarioRole').value; if(!nome || !login) { showPush('Nome e login obrigatórios', true); return; } if(!editingUserId && !senha) { showPush('Senha obrigatória', true); return; } try { if(editingUserId) { const updateData = { nome, username: login, role }; if(senha) updateData.password = senha; await db.collection('users').doc(editingUserId).update(updateData); await addLog('Usuário editado', `${nome}`); showPush('Usuário atualizado'); } else { const usersSnap = await db.collection('users').where('username', '==', login).get(); if(!usersSnap.empty) { showPush('Login já existe', true); return; } const newId = Date.now().toString(); await db.collection('users').doc(newId).set({ id: newId, username: login, password: senha, role, nome }); await addLog('Usuário criado', `${nome} (${login})`); showPush('Usuário criado'); } document.getElementById('usuarioModal').style.display = 'none'; renderApp(); } catch(e) { showPush("Erro ao salvar usuário: " + e.message, true); } });
        document.getElementById('cancelUsuarioBtn')?.addEventListener('click', () => document.getElementById('usuarioModal').style.display = 'none');
    }
    setupModalListeners();

    async function attachEvents() { 
        if (currentSection === 'vendas') await attachVendasEvents(); 
        if (currentSection === 'produtos') await attachProdutosEvents(); 
        if (currentSection === 'clientes') await attachClientesEvents(); 
        if (currentSection === 'relatorios') await attachRelatoriosEvents(); 
        if (currentSection === 'config') await attachConfigEvents(); 
        if (currentSection === 'usuarios') await attachUsuariosEvents(); 
    }
    (async () => { await inicializarDados(); await renderApp(); })();
</script>
</body>
